<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' https: data:">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f1a;
    --bg2: #161625;
    --bg3: #1e1e30;
    --border: #2a2a40;
    --divider: #1e1e35;
    --text: #e2e8f0;
    --text-soft: #c8d0de;
    --dim: #8892a4;
    --hover-bg: #252540;
    --hover-bg-2: #3a3a52;
  }
  :root[data-theme="light"] {
    --bg: #f4f5f7;
    --bg2: #ffffff;
    --bg3: #eceef2;
    --border: #dde1e7;
    --divider: #e4e7ec;
    --text: #1a1d24;
    --text-soft: #3a3f4a;
    --dim: #6b7280;
    --hover-bg: #eceef2;
    --hover-bg-2: #dde1e7;
  }
  html, body { height: 78px; overflow: hidden; }
  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    user-select: none;
  }

  /* ── Row 1: tabs ── */
  #tab-row {
    height: 40px;
    display: flex;
    align-items: stretch;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }
  #client-pill {
    display: flex;
    align-items: center;
    padding: 0 14px;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }
  #client-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  #tabs-wrap {
    flex: 1;
    display: flex;
    align-items: flex-end;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 0 6px;
    gap: 2px;
    -webkit-app-region: no-drag;
    min-width: 0;
  }
  #tabs-wrap::-webkit-scrollbar { height: 0; }

  #btn-new-tab {
    width: 26px; height: 26px;
    margin: 0 4px 6px 6px;
    flex-shrink: 0;
    border: none;
    background: transparent;
    color: var(--dim);
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .1s, color .1s;
    -webkit-app-region: no-drag;
    line-height: 1;
  }
  #btn-new-tab:hover { background: var(--hover-bg); color: var(--text); }

  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 10px;
    height: 34px;
    min-width: 120px;
    max-width: 220px;
    flex-shrink: 0;
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    margin-top: 4px;
  }
  .tab:hover { background: var(--bg2); border-color: var(--hover-bg); }
  .tab.active {
    background: var(--bg2);
    border-color: var(--border);
    box-shadow: inset 0 2px 0 0 var(--cc, #3b82f6);
  }
  .tab.dragging { opacity: .4; }
  .tab.drag-over { border-color: var(--cc, #3b82f6); }
  .tab-favicon { width: 14px; height: 14px; flex-shrink: 0; border-radius: 2px; object-fit: contain; }
  .tab-favicon-placeholder { width: 14px; height: 14px; flex-shrink: 0; border-radius: 2px; background: var(--border); }
  .tab-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--dim);
    transition: color .12s;
  }
  .tab.active .tab-title { color: var(--text); }
  .tab-close {
    flex-shrink: 0;
    width: 16px; height: 16px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    color: transparent;
    transition: background .1s, color .1s;
    line-height: 1;
  }
  .tab:hover .tab-close,
  .tab.active .tab-close { color: var(--dim); }
  .tab-close:hover { background: var(--hover-bg-2) !important; color: #f87171 !important; }

  /* ── Row 2: navigation ── */
  #nav-row {
    height: 38px;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 8px;
    background: var(--bg2);
    border-bottom: 1px solid var(--divider);
    flex-shrink: 0;
  }
  .nav-btn {
    width: 28px; height: 28px;
    border: none;
    background: transparent;
    color: var(--dim);
    font-size: 15px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .1s, color .1s;
    flex-shrink: 0;
    line-height: 1;
  }
  .nav-btn:hover:not(:disabled) { background: var(--hover-bg); color: var(--text); }
  .nav-btn:disabled { opacity: .3; cursor: default; }

  #address {
    flex: 1;
    height: 26px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 13px;
    color: var(--text-soft);
    font-size: 12px;
    padding: 0 14px;
    outline: none;
    min-width: 0;
    transition: border-color .15s;
    font-family: inherit;
  }
  #address:focus { border-color: var(--cc, #3b82f6); color: var(--text); }
  .nav-btn.saved { color: #fbbf24; }
  .nav-btn.saved:hover:not(:disabled) { color: #fbbf24; }

  #btn-switcher {
    display: flex; align-items: center; gap: 6px;
    height: 26px; padding: 0 9px 0 10px;
    flex-shrink: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 13px;
    color: var(--dim);
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  #btn-switcher:hover { color: var(--text); border-color: var(--cc, #3b82f6); }
  #btn-switcher .kbd {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: inherit;
  }
</style>
</head>
<body>
<div id="tab-row">
  <div id="client-pill"><div id="client-dot"></div></div>
  <div id="tabs-wrap"></div>
</div>
<div id="nav-row">
  <button class="nav-btn" id="btn-back" title="Back">‹</button>
  <button class="nav-btn" id="btn-forward" title="Forward">›</button>
  <button class="nav-btn" id="btn-reload" title="Reload">⟳</button>
  <input id="address" spellcheck="false" placeholder="Enter address…">
  <button class="nav-btn" id="btn-save" title="Save to portals">☆</button>
  <button id="btn-switcher" title="Switch to another client">
    <span>⇄ Switch client</span>
    <span class="kbd">Ctrl+K</span>
  </button>
</div>
<script>
  let clientId = null;
  let state = { clientName: '', color: '#3b82f6', tabs: [], activeIdx: -1 };
  let focusAddressOnNextUpdate = false;
  let dragSrcIdx = null;
  const address = document.getElementById('address');

  const newTabBtn = document.createElement('button');
  newTabBtn.id = 'btn-new-tab';
  newTabBtn.title = 'New tab (Ctrl+T)';
  newTabBtn.textContent = '+';
  newTabBtn.addEventListener('click', () => {
    if (!clientId) return;
    focusAddressOnNextUpdate = true;
    window.tabAPI.newTab(clientId);
  });

  function render() {
    document.body.style.setProperty('--cc', state.color);
    const dot = document.getElementById('client-dot');
    dot.style.cssText = `background:${state.color}; box-shadow: 0 0 8px ${state.color}90`;
    dot.title = state.clientName;

    const wrap = document.getElementById('tabs-wrap');
    newTabBtn.remove(); // detach before clearing, so the node (and its listener) survives
    wrap.innerHTML = '';

    state.tabs.forEach((tab, i) => {
      const el = document.createElement('div');
      el.className = 'tab' + (i === state.activeIdx ? ' active' : '');
      el.draggable = true;

      el.addEventListener('dragstart', e => {
        dragSrcIdx = i;
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(i));
      });
      el.addEventListener('dragover', e => {
        if (dragSrcIdx === null) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        el.classList.add('drag-over');
      });
      el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
      el.addEventListener('drop', e => {
        e.preventDefault();
        el.classList.remove('drag-over');
        if (clientId && dragSrcIdx !== null && dragSrcIdx !== i) window.tabAPI.reorderTab(clientId, dragSrcIdx, i);
        dragSrcIdx = null;
      });
      el.addEventListener('dragend', () => {
        dragSrcIdx = null;
        wrap.querySelectorAll('.tab').forEach(t => t.classList.remove('dragging', 'drag-over'));
      });

      if (tab.favicon) {
        const img = document.createElement('img');
        img.className = 'tab-favicon';
        img.src = tab.favicon;
        img.onerror = () => img.replaceWith(makePlaceholder());
        el.appendChild(img);
      } else {
        el.appendChild(makePlaceholder());
      }

      const title = document.createElement('span');
      title.className = 'tab-title';
      title.textContent = tab.title;

      const close = document.createElement('span');
      close.className = 'tab-close';
      close.textContent = '✕';

      el.appendChild(title);
      el.appendChild(close);

      el.addEventListener('click', () => { if (clientId) window.tabAPI.switchTab(clientId, i); });
      el.addEventListener('auxclick', e => {   // middle-click closes
        if (e.button === 1 && clientId) window.tabAPI.closeTab(clientId, i);
      });
      close.addEventListener('click', e => {
        e.stopPropagation();
        if (clientId) window.tabAPI.closeTab(clientId, i);
      });

      wrap.appendChild(el);
    });

    wrap.appendChild(newTabBtn);

    const activeEl = wrap.children[state.activeIdx];
    if (activeEl) activeEl.scrollIntoView({ inline: 'nearest', block: 'nearest' });

    // Nav row reflects the active tab
    const active = state.tabs[state.activeIdx];
    document.getElementById('btn-back').disabled = !active?.canGoBack;
    document.getElementById('btn-forward').disabled = !active?.canGoForward;
    document.getElementById('btn-reload').disabled = !active;
    const saveBtn = document.getElementById('btn-save');
    saveBtn.disabled = !active?.url;
    saveBtn.textContent = active?.isSaved ? '★' : '☆';
    saveBtn.classList.toggle('saved', !!active?.isSaved);
    saveBtn.title = active?.isSaved ? 'Remove from portals' : 'Save to portals';
    if (document.activeElement !== address) {
      address.value = active?.url || '';
    }

    if (focusAddressOnNextUpdate) {
      focusAddressOnNextUpdate = false;
      address.focus();
      address.select();
    }
  }

  function makePlaceholder() {
    const d = document.createElement('div');
    d.className = 'tab-favicon-placeholder';
    return d;
  }

  document.getElementById('btn-back').addEventListener('click', () => clientId && window.tabAPI.nav(clientId, 'back'));
  document.getElementById('btn-forward').addEventListener('click', () => clientId && window.tabAPI.nav(clientId, 'forward'));
  document.getElementById('btn-reload').addEventListener('click', () => clientId && window.tabAPI.nav(clientId, 'reload'));
  document.getElementById('btn-save').addEventListener('click', () => clientId && window.tabAPI.toggleSave(clientId));
  document.getElementById('btn-switcher').addEventListener('click', () => clientId && window.tabAPI.openSwitcher(clientId));

  address.addEventListener('keydown', e => {
    if (e.key === 'Enter' && clientId && address.value.trim()) {
      window.tabAPI.go(clientId, address.value);
      address.blur();
    } else if (e.key === 'Escape') {
      address.value = state.tabs[state.activeIdx]?.url || '';
      address.blur();
    }
  });
  address.addEventListener('focus', () => address.select());

  window.tabAPI.onUpdate(s => { clientId = s.clientId; state = s; render(); });
  window.tabAPI.getState().then(s => { if (s) { clientId = s.clientId; state = s; render(); } });

  window.tabAPI.getTheme().then(t => { document.documentElement.dataset.theme = t; });
  window.tabAPI.onThemeChange(t => { document.documentElement.dataset.theme = t; });
</script>
</body>
</html>
