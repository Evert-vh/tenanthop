<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: rgba(10,10,20,.82);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 12vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e2e8f0;
    user-select: none;
  }

  #card {
    width: 460px;
    max-width: 90vw;
    max-height: 60vh;
    background: #161625;
    border: 1px solid #2a2a40;
    border-radius: 14px;
    box-shadow: 0 24px 64px rgba(0,0,0,.6);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #search-row {
    padding: 12px;
    border-bottom: 1px solid #2a2a40;
    flex-shrink: 0;
  }
  #search {
    width: 100%;
    background: #0f0f1a;
    border: 1px solid #2a2a40;
    color: #e2e8f0;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  #search:focus { border-color: #3b82f6; }
  #search::placeholder { color: #8892a4; }

  #list {
    overflow-y: auto;
    padding: 6px;
  }
  #list::-webkit-scrollbar { width: 5px; }
  #list::-webkit-scrollbar-thumb { background: #2a2a40; border-radius: 3px; }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .row.active { background: #1e1e30; }
  .row .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .star { color: #f59e0b; font-size: 11px; flex-shrink: 0; }
  .row .current-tag {
    font-size: 10px; font-weight: 700;
    color: #8892a4; background: #0f0f1a;
    padding: 2px 7px; border-radius: 8px;
    flex-shrink: 0; letter-spacing: .3px;
  }

  #empty {
    padding: 24px 12px;
    text-align: center;
    color: #8892a4;
    font-size: 13px;
  }

  #hint {
    padding: 8px 14px;
    border-top: 1px solid #2a2a40;
    font-size: 11px;
    color: #8892a4;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div id="card">
  <div id="search-row">
    <input id="search" spellcheck="false" placeholder="Jump to client…">
  </div>
  <div id="list"></div>
  <div id="hint">↑↓ to navigate · Enter to switch · Esc to close</div>
</div>
<script>
  let clients = [];
  let currentClientId = null;
  let filtered = [];
  let activeIdx = 0;

  const search = document.getElementById('search');
  const listEl = document.getElementById('list');

  function render() {
    const q = search.value.trim().toLowerCase();
    filtered = clients
      .filter(c => !q || c.name.toLowerCase().includes(q))
      .sort((a, b) => (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0));

    if (activeIdx >= filtered.length) activeIdx = Math.max(0, filtered.length - 1);

    listEl.innerHTML = '';
    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.id = 'empty';
      empty.textContent = 'No matching clients';
      listEl.appendChild(empty);
      return;
    }

    filtered.forEach((c, i) => {
      const row = document.createElement('div');
      row.className = 'row' + (i === activeIdx ? ' active' : '');

      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = c.color || '#6b7280';
      row.appendChild(dot);

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = c.name;
      row.appendChild(name);

      if (c.favorite) {
        const star = document.createElement('span');
        star.className = 'star';
        star.textContent = '★';
        row.appendChild(star);
      }

      if (c.id === currentClientId) {
        const tag = document.createElement('span');
        tag.className = 'current-tag';
        tag.textContent = 'CURRENT';
        row.appendChild(tag);
      }

      row.addEventListener('mouseenter', () => { activeIdx = i; render(); });
      row.addEventListener('click', () => select(i));
      listEl.appendChild(row);
    });

    const activeEl = listEl.children[activeIdx];
    if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
  }

  function select(i) {
    const target = filtered[i];
    if (!target) return;
    window.switcherAPI.go(currentClientId, target.id);
  }

  search.addEventListener('input', () => { activeIdx = 0; render(); });
  search.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, filtered.length - 1); render(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); render(); }
    else if (e.key === 'Enter') { e.preventDefault(); select(activeIdx); }
    else if (e.key === 'Escape') { e.preventDefault(); window.switcherAPI.close(currentClientId); }
  });

  document.body.addEventListener('click', e => {
    if (e.target === document.body) window.switcherAPI.close(currentClientId);
  });

  window.switcherAPI.onOpen(({ clients: c, currentClientId: cid }) => {
    clients = c;
    currentClientId = cid;
    activeIdx = 0;
    search.value = '';
    render();
    search.focus();
  });
</script>
</body>
</html>
