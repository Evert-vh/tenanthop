<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --backdrop: rgba(10,10,20,.82);
    --bg2: #161625;
    --bg: #0f0f1a;
    --bg3: #1e1e30;
    --border: #2a2a40;
    --text: #e2e8f0;
    --dim: #8892a4;
  }
  :root[data-theme="light"] {
    --backdrop: rgba(120,125,140,.5);
    --bg2: #ffffff;
    --bg: #f4f5f7;
    --bg3: #eceef2;
    --border: #dde1e7;
    --text: #1a1d24;
    --dim: #6b7280;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--backdrop);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 12vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    user-select: none;
  }

  #card {
    width: 480px;
    max-width: 90vw;
    max-height: 64vh;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 24px 64px rgba(0,0,0,.6);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #search-row {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  #search:focus { border-color: #3b82f6; }
  #search::placeholder { color: var(--dim); }

  #list {
    overflow-y: auto;
    padding: 6px;
  }
  #list::-webkit-scrollbar { width: 5px; }
  #list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .group-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
    color: var(--dim);
    padding: 8px 10px 4px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .row.active { background: var(--bg3); }
  .row .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .row .text-block { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .row .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .sub {
    font-size: 10.5px;
    color: var(--dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .row .star { color: #f59e0b; font-size: 11px; flex-shrink: 0; }
  .row .current-tag {
    font-size: 10px; font-weight: 700;
    color: var(--dim); background: var(--bg);
    padding: 2px 7px; border-radius: 8px;
    flex-shrink: 0; letter-spacing: .3px;
  }

  #empty {
    padding: 24px 12px;
    text-align: center;
    color: var(--dim);
    font-size: 13px;
  }

  #hint {
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--dim);
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div id="card">
  <div id="search-row">
    <input id="search" spellcheck="false" placeholder="Jump to a client, or a client + portal…">
  </div>
  <div id="list"></div>
  <div id="hint">↑↓ to navigate · Enter to switch · Esc to close</div>
</div>
<script>
  let clients = [];
  let defaultPortals = [];
  let googlePortals = [];
  let currentClientId = null;
  let filtered = []; // flat list of { type: 'client', client } | { type: 'portal', client, portal }
  let activeIdx = 0;

  const search = document.getElementById('search');
  const listEl = document.getElementById('list');
  const PORTAL_RESULT_CAP = 8;

  function tokensMatch(query, haystack) {
    const tokens = query.toLowerCase().split(/\s+/).filter(Boolean);
    const h = haystack.toLowerCase();
    return tokens.every(t => h.includes(t));
  }

  function clientPortals(client) {
    const disabled = new Set(client.portals?.disabled || []);
    const platforms = client.platforms || { m365: true, google: false };
    const catalog = [
      ...(platforms.m365 !== false ? defaultPortals : []),
      ...(platforms.google ? googlePortals : []),
    ];
    const visible = catalog.filter(p => !disabled.has(p.id));
    return [...visible, ...(client.portals?.custom || [])];
  }

  function computeResults() {
    const q = search.value.trim();
    const sortedClients = [...clients].sort((a, b) => (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0));

    if (!q) {
      return sortedClients.map(client => ({ type: 'client', client }));
    }

    const matchingClients = sortedClients
      .filter(c => tokensMatch(q, c.name))
      .map(client => ({ type: 'client', client }));

    const portalResults = [];
    for (const client of sortedClients) {
      if (portalResults.length >= PORTAL_RESULT_CAP) break;
      for (const portal of clientPortals(client)) {
        if (tokensMatch(q, client.name + ' ' + portal.name)) {
          portalResults.push({ type: 'portal', client, portal });
          if (portalResults.length >= PORTAL_RESULT_CAP) break;
        }
      }
    }

    return [...matchingClients, ...portalResults];
  }

  function render() {
    filtered = computeResults();
    if (activeIdx >= filtered.length) activeIdx = Math.max(0, filtered.length - 1);

    listEl.innerHTML = '';
    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.id = 'empty';
      empty.textContent = 'No matches';
      listEl.appendChild(empty);
      return;
    }

    const q = search.value.trim();
    let printedClientLabel = false;
    let printedPortalLabel = false;

    filtered.forEach((item, i) => {
      if (q && item.type === 'client' && !printedClientLabel) {
        printedClientLabel = true;
        listEl.appendChild(groupLabel('CLIENTS'));
      }
      if (q && item.type === 'portal' && !printedPortalLabel) {
        printedPortalLabel = true;
        listEl.appendChild(groupLabel('PORTALS'));
      }

      const row = document.createElement('div');
      row.className = 'row' + (i === activeIdx ? ' active' : '');

      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = item.client.color || '#6b7280';
      row.appendChild(dot);

      const textBlock = document.createElement('div');
      textBlock.className = 'text-block';
      const name = document.createElement('span');
      name.className = 'name';
      if (item.type === 'client') {
        name.textContent = item.client.name;
        textBlock.appendChild(name);
      } else {
        name.textContent = item.portal.name;
        const sub = document.createElement('span');
        sub.className = 'sub';
        sub.textContent = item.client.name;
        textBlock.appendChild(name);
        textBlock.appendChild(sub);
      }
      row.appendChild(textBlock);

      if (item.type === 'client' && item.client.favorite) {
        const star = document.createElement('span');
        star.className = 'star';
        star.textContent = '★';
        row.appendChild(star);
      }

      if (item.type === 'client' && item.client.id === currentClientId) {
        const tag = document.createElement('span');
        tag.className = 'current-tag';
        tag.textContent = 'CURRENT';
        row.appendChild(tag);
      }

      // Only toggle the highlight class on hover — don't call render() here.
      // Rebuilding the whole list mid-hover replaces the exact DOM node the OS
      // is tracking for the click gesture, which silently breaks native click
      // synthesis for real mouse input (keyboard nav never hit this, since
      // Enter reads straight from the `filtered` array, no DOM identity involved).
      row.addEventListener('mouseenter', () => {
        activeIdx = i;
        listEl.querySelectorAll('.row').forEach((r, idx) => r.classList.toggle('active', idx === i));
      });
      row.addEventListener('click', () => select(i));
      listEl.appendChild(row);
    });

    const activeRow = [...listEl.querySelectorAll('.row')][activeIdx];
    if (activeRow) activeRow.scrollIntoView({ block: 'nearest' });
  }

  function groupLabel(text) {
    const el = document.createElement('div');
    el.className = 'group-label';
    el.textContent = text;
    return el;
  }

  function select(i) {
    const item = filtered[i];
    if (!item) return;
    if (item.type === 'portal') {
      window.switcherAPI.go(currentClientId, item.client.id, { url: item.portal.url, name: item.portal.name });
    } else {
      window.switcherAPI.go(currentClientId, item.client.id);
    }
  }

  search.addEventListener('input', () => { activeIdx = 0; render(); });
  search.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, filtered.length - 1); render(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); render(); }
    else if (e.key === 'Enter') { e.preventDefault(); select(activeIdx); }
    else if (e.key === 'Escape') { e.preventDefault(); window.switcherAPI.close(currentClientId); }
  });

  document.body.addEventListener('click', e => {
    if (e.target === document.body) window.switcherAPI.close(currentClientId);
  });

  window.switcherAPI.onOpen(({ clients: c, currentClientId: cid, defaultPortals: dp, googlePortals: gp }) => {
    clients = c;
    defaultPortals = dp || [];
    googlePortals = gp || [];
    currentClientId = cid;
    activeIdx = 0;
    search.value = '';
    render();
    search.focus();
  });

  window.switcherAPI.getTheme().then(t => { document.documentElement.dataset.theme = t; });
  window.switcherAPI.onThemeChange(t => { document.documentElement.dataset.theme = t; });
</script>
</body>
</html>
